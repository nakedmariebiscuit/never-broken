<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Never Broken</title>

  <!--
    Never Broken — A kintsugi-inspired interactive app.
    Every crack becomes gold. Every fracture, a story.

    To embed this app in another page, you can:
      1. Use an <iframe src="path/to/index.html"></iframe>
      2. Copy the #app-container div and all <script> / <link> tags into your page.
      3. Wrap it in a draggable/resizable window widget on your portfolio site.

    The #app-container is sized via CSS and can be adjusted freely.
  -->

  <!-- Google Fonts — Cormorant Garamond for an elegant, calm feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lato:wght@300;400&display=swap"
    rel="stylesheet"
  />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>

  <!--
    #app-container is the root of the entire app.
    Its width and height are set in styles.css and can be changed freely.
    When embedding via iframe, the iframe dimensions control the size.
  -->
  <div id="app-container">

    <!-- ── Canvas Layer ──────────────────────────────────────────────── -->
    <!--
      Two stacked canvases:
        1. #surface-canvas  — the ceramic surface texture (redrawn on reset)
        2. #fracture-canvas — all cracks and gold seams (persistent history)
      A third canvas (#fx-canvas) sits on top for transient effects
      (tension trembles, active crack preview, shimmer glow).
    -->
    <div id="canvas-wrapper">
      <canvas id="surface-canvas"  aria-hidden="true"></canvas>
      <canvas id="fracture-canvas" aria-hidden="true"></canvas>
      <canvas id="fx-canvas"
        role="img"
        aria-label="Interactive kintsugi ceramic surface. Click and drag to create fractures filled with gold."
      ></canvas>
    </div>

    <!-- ── Top Control Bar ───────────────────────────────────────────── -->
    <header id="top-bar" aria-label="App controls">

      <!-- App title -->
      <div id="app-title">Never Broken</div>

      <!-- Surface selector -->
      <div id="surface-selector" role="group" aria-label="Choose ceramic surface">
        <span class="control-label">Surface</span>
        <div id="surface-swatches">
          <!-- Swatches are generated dynamically by surface-controller.js -->
        </div>
      </div>

      <!-- Sound toggle button -->
      <button id="sound-toggle-btn" class="icon-btn" aria-label="Open sound settings" title="Sound settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>

      <!-- Reset button -->
      <button id="reset-btn" class="icon-btn" aria-label="Reset ceramic surface" title="Reset surface">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
        </svg>
      </button>

    </header>

    <!-- ── Sound Panel (hidden by default) ──────────────────────────── -->
    <aside id="sound-panel" aria-label="Sound settings" hidden>
      <div class="panel-title">Sound</div>

      <!-- Master mute -->
      <div class="sound-row master-row">
        <label class="sound-label" for="master-volume">Master</label>
        <input type="range" id="master-volume" class="volume-slider" min="0" max="1" step="0.01" value="1" aria-label="Master volume" />
        <button class="mute-btn active" id="master-mute" aria-label="Mute all sounds" data-layer="master">
          <span class="mute-icon">♪</span>
        </button>
      </div>

      <hr class="panel-divider" />

      <!-- Individual sound layers — generated by audio-controller.js -->
      <div id="sound-layers">
        <!-- Populated dynamically -->
      </div>
    </aside>

    <!-- ── Tutorial Bar ──────────────────────────────────────────────── -->
    <footer id="tutorial-bar" aria-label="Tutorial">
      <p id="tutorial-main"></p>
      <p id="tutorial-helper"></p>
    </footer>

  </div><!-- /#app-container -->

  <!-- ──────────────────────────────────────────────────────────────────── -->
  <!-- Scripts — loaded in dependency order                                 -->
  <!-- config.js must be first; app.js must be last                         -->
  <!-- ──────────────────────────────────────────────────────────────────── -->
  <script src="src/js/config.js"></script>
  <script src="src/js/surface-controller.js"></script>
  <script src="src/js/pressure-controller.js"></script>
  <script src="src/js/fracture-engine.js"></script>
  <script src="src/js/gold-fill-engine.js"></script>
  <script src="src/js/audio-controller.js"></script>
  <script src="src/js/ui-controller.js"></script>
  <script src="src/js/app.js"></script>

</body>
</html>
